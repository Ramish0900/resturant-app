version: '3.9'

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: smartdine-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: smartdine
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-smartdine_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Node.js API Server
  api:
    build: ./server
    container_name: smartdine-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: smartdine
      DB_USER: postgres
      DB_PASS: ${DB_PASSWORD:-smartdine_pass}
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production-use-long-random-string}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:3000}
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy

  # React Frontend (served via nginx)
  client:
    build: ./client
    container_name: smartdine-client
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  postgres_data:
